# Base configuration for brain tumor MRI classification benchmark.
# Override per-model settings in configs/models/<model>.yaml

data:
  raw_dir: data/raw
  train_dir: data/raw/Training
  test_dir: data/raw/Testing
  image_size: 128
  num_classes: 4
  class_names:
    - glioma
    - meningioma
    - notumor
    - pituitary
  batch_size: 20  # Paper default; small for modern GPUs — increase if memory allows
  num_workers: 4
  fast_dev_subset: 64

preprocessing:
  # Paper-faithful pipeline: grayscale -> blur -> threshold -> ROI crop -> resize.
  # After grayscale steps, replicate to 3 channels for ImageNet-pretrained backbones.
  enable_grayscale: true
  enable_gaussian_blur: true
  gaussian_kernel_size: 5
  gaussian_sigma: 0.0
  enable_threshold: true
  threshold_value: 127
  enable_roi_crop: true
  replicate_grayscale_to_rgb: true

augmentation:
  # Paper used brightness/contrast jitter in [0.8, 1.2] only.
  brightness_range: [0.8, 1.2]
  contrast_range: [0.8, 1.2]
  extended: false
  horizontal_flip: false
  vertical_flip: false
  rotation_degrees: 0

model:
  name: xception
  pretrained: true
  freeze_backbone: true
  fine_tune_last_n_layers: 0
  dropout1: 0.3
  dropout2: 0.2
  head_hidden_dim: 128
  # Paper normalized to [0,1]. ImageNet backbones typically use mean/std normalization.
  # Set use_imagenet_norm=true to match timm/ImageNet expectations (deviation from paper).
  use_imagenet_norm: false
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std: [0.229, 0.224, 0.225]

training:
  optimizer: adam
  learning_rate: 0.0001
  epochs: 5
  early_stopping: false
  early_stopping_patience: 3
  seed: 42
  device: cuda
  mixed_precision: true
  fast_dev_run: false
  checkpoint_dir: checkpoints
  results_dir: results

logging:
  use_wandb: false
  wandb_project: brain-tumor-mri
  wandb_run_name: null
  log_every_n_steps: 10

evaluation:
  save_confusion_matrix: true
  save_comparison_chart: true

inference:
  default_checkpoint: checkpoints/xception/best.pt
